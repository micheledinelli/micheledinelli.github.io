name: Deploy Hugo site with ips-config

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          submodules: true

      - name: Checkout ips-config repository
        uses: actions/checkout@v2
        with:
          repository: micheledinelli/ips-config
          path: ips-config

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "latest"

      - name: Build Hugo site
        run: hugo

      - name: Copy ips-config content
        run: |
          mkdir -p public/ips-config
          cp -r ips-config/* public/ips-config/

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          cd public
          git init
          git add .
          git commit -m "Deploy site"
          git push --force "https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git" master:gh-pages
